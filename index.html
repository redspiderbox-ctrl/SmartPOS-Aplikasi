<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Kasir Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .content-section { display: none; }
        .content-section.active { display: block; }
        .sidebar-item.active { background-color: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="h-full bg-slate-50">

    <!-- Dashboard Main -->
    <div id="app" class="h-screen flex">
        <aside class="w-64 bg-slate-900 text-white p-6">
            <h1 class="text-xl font-bold mb-10">POS System</h1>
            <nav class="space-y-2">
                <div onclick="switchMenu('dashboard')" class="sidebar-item p-3 rounded-lg cursor-pointer active">Dashboard</div>
                <div onclick="switchMenu('penjualan')" class="sidebar-item p-3 rounded-lg cursor-pointer">Penjualan</div>
                <div onclick="switchMenu('produk')" class="sidebar-item p-3 rounded-lg cursor-pointer">Produk</div>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-8">
            <!-- Dashboard Section -->
            <section id="dashboard" class="content-section active">
                <h2 class="text-3xl font-bold mb-8">Dashboard</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border">
                        <p class="text-slate-500 text-sm">Total Nilai Modal</p>
                        <h3 id="totalModal" class="text-2xl font-bold text-emerald-600">Rp 0</h3>
                    </div>
                </div>
            </section>

            <!-- Penjualan Section (Updated) -->
            <section id="penjualan" class="content-section">
                <h2 class="text-3xl font-bold mb-8">Kasir</h2>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border">
                        <div class="flex gap-4 mb-6">
                            <select id="selProduct" class="flex-1 p-3 border rounded-lg">
                                <option value="">Pilih Produk</option>
                            </select>
                            <input type="number" id="selQty" value="1" class="w-20 p-3 border rounded-lg" placeholder="Qty">
                            <button onclick="addToCart()" class="bg-emerald-600 text-white px-6 py-2 rounded-lg">Tambah</button>
                        </div>
                        <table class="w-full">
                            <thead class="bg-slate-50 border-b">
                                <tr>
                                    <th class="p-4 text-left">Produk</th>
                                    <th class="p-4">Qty</th>
                                    <th class="p-4 text-right">Subtotal</th>
                                </tr>
                            </thead>
                            <tbody id="cartTableBody"></tbody>
                        </table>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border h-fit">
                        <h3 class="text-xl font-bold mb-4">Total Bayar</h3>
                        <div id="cartTotal" class="text-4xl font-bold text-blue-600 mb-6">Rp 0</div>
                        <button onclick="checkout()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg">Bayar Sekarang</button>
                    </div>
                </div>
            </section>

            <!-- Product Section -->
            <section id="produk" class="content-section">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-bold">Daftar Produk</h2>
                    <button onclick="openModal('add')" class="bg-blue-600 text-white px-6 py-2 rounded-lg">Tambah Produk</button>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-4">Nama</th>
                                <th class="p-4">Stok</th>
                                <th class="p-4">Harga Modal</th>
                                <th class="p-4">Harga Jual</th>
                                <th class="p-4">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="productTableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl w-full max-w-md">
            <h3 id="modalTitle" class="text-xl font-bold mb-4">Tambah Produk</h3>
            <input type="hidden" id="editIndex">
            <div class="space-y-4">
                <input type="text" id="prodName" placeholder="Nama Produk" class="w-full p-3 border rounded-lg">
                <input type="number" id="prodStock" placeholder="Stok" class="w-full p-3 border rounded-lg">
                <input type="number" id="prodModalPrice" placeholder="Harga Modal" class="w-full p-3 border rounded-lg">
                <input type="number" id="prodPrice" placeholder="Harga Jual" class="w-full p-3 border rounded-lg">
                <div class="flex gap-4">
                    <button onclick="closeModal()" class="flex-1 bg-slate-200 p-3 rounded-lg">Batal</button>
                    <button onclick="saveProduct()" class="flex-1 bg-blue-600 text-white p-3 rounded-lg">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let products = [];
        let cart = [];

        function loadData() {
            google.script.run.withSuccessHandler(data => {
                products = data;
                renderProducts();
                renderProductDropdown();
            }).getProducts();
        }

        function renderProductDropdown() {
            const select = document.getElementById('selProduct');
            select.innerHTML = '<option value="">Pilih Produk</option>' + products.map((p, i) => `
                <option value="${i}">${p.name} - Rp ${parseInt(p.price).toLocaleString()}</option>
            `).join('');
        }

        function addToCart() {
            const index = document.getElementById('selProduct').value;
            const qty = parseInt(document.getElementById('selQty').value);
            if(index === "" || qty <= 0) return;
            
            const product = products[index];
            cart.push({...product, qty: qty, subtotal: product.price * qty});
            renderCart();
        }

        function renderCart() {
            const tbody = document.getElementById('cartTableBody');
            tbody.innerHTML = cart.map(item => `
                <tr class="border-b">
                    <td class="p-4">${item.name}</td>
                    <td class="p-4 text-center">${item.qty}</td>
                    <td class="p-4 text-right">Rp ${(item.subtotal).toLocaleString()}</td>
                </tr>
            `).join('');
            const total = cart.reduce((acc, item) => acc + item.subtotal, 0);
            document.getElementById('cartTotal').innerText = 'Rp ' + total.toLocaleString('id-ID');
        }

        function checkout() {
            if(cart.length === 0) return;
            const total = cart.reduce((acc, item) => acc + item.subtotal, 0);
            google.script.run.withSuccessHandler(() => {
                alert('Transaksi Berhasil!');
                cart = [];
                renderCart();
            }).recordSale(cart, total);
        }

        function renderProducts() {
            const tbody = document.getElementById('productTableBody');
            tbody.innerHTML = products.map((p, i) => `
                <tr class="border-b">
                    <td class="p-4">${p.name}</td>
                    <td class="p-4">${p.stock}</td>
                    <td class="p-4">Rp ${parseInt(p.modalPrice).toLocaleString()}</td>
                    <td class="p-4">Rp ${parseInt(p.price).toLocaleString()}</td>
                    <td class="p-4"><button onclick="openModal('edit', ${i})" class="text-blue-600">Edit</button></td>
                </tr>
            `).join('');
            calculateDashboard();
        }

        function saveProduct() {
            const index = document.getElementById('editIndex').value;
            const newProduct = {
                name: document.getElementById('prodName').value,
                stock: document.getElementById('prodStock').value,
                modalPrice: document.getElementById('prodModalPrice').value,
                price: document.getElementById('prodPrice').value
            };
            google.script.run.withSuccessHandler(updatedData => {
                products = updatedData;
                renderProducts();
                closeModal();
            }).saveProduct(newProduct, index);
        }

        function calculateDashboard() {
            const total = products.reduce((acc, p) => acc + (p.stock * p.modalPrice), 0);
            document.getElementById('totalModal').innerText = 'Rp ' + total.toLocaleString('id-ID');
        }

        function openModal(mode, index = null) {
            document.getElementById('productModal').classList.remove('hidden');
            if (mode === 'edit') {
                const p = products[index];
                document.getElementById('modalTitle').innerText = 'Edit Produk';
                document.getElementById('editIndex').value = index;
                document.getElementById('prodName').value = p.name;
                document.getElementById('prodStock').value = p.stock;
                document.getElementById('prodModalPrice').value = p.modalPrice;
                document.getElementById('prodPrice').value = p.price;
            } else {
                document.getElementById('modalTitle').innerText = 'Tambah Produk';
                document.getElementById('editIndex').value = '';
            }
        }

        function closeModal() { document.getElementById('productModal').classList.add('hidden'); }

        function switchMenu(menuId) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(menuId).classList.add('active');
        }

        window.onload = loadData;
    </script>
</body>
</html>
