<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Kasir Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-item:hover { background-color: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="h-full bg-slate-50 text-slate-800">

    <script>
        // PASTE URL Web App dari Google Apps Script di bawah ini:
        const API_URL = "PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE";
    </script>

    <div id="loginPage" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-slate-100">
            <h2 class="text-2xl font-bold mb-6 text-center text-slate-700">Login Kasir</h2>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full p-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="password" placeholder="Password" class="w-full p-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-semibold hover:bg-blue-700 transition">Masuk</button>
            </div>
            <p id="loginError" class="text-red-500 text-sm mt-4 text-center hidden">Username atau password salah!</p>
        </div>
    </div>

    <div id="dashboardPage" class="hidden h-screen flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white p-6 hidden md:block">
            <h1 class="text-xl font-bold mb-10">POS System</h1>
            <nav class="space-y-4">
                <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center gap-3"><span>Dashboard</span></div>
                <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center gap-3"><span>Penjualan</span></div>
                <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center gap-3"><span>Produk</span></div>
                <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center gap-3" onclick="location.reload()"><span>Logout</span></div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-8">
            <header class="mb-8">
                <h2 class="text-3xl font-bold text-slate-800">Dashboard</h2>
                <p class="text-slate-500">Selamat datang kembali, admin.</p>
            </header>

            <!-- Stats Grid -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-slate-500 text-sm">Total Penjualan</p>
                    <h3 class="text-2xl font-bold text-blue-600">Rp 1.250.000</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-slate-500 text-sm">Jumlah Transaksi</p>
                    <h3 class="text-2xl font-bold text-slate-700">12 Order</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-slate-500 text-sm">Stok Rendah</p>
                    <h3 class="text-2xl font-bold text-amber-500">3 Item</h3>
                </div>
            </div>
        </main>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('loginError');

            if (user === 'admin' && pass === 'admin') {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboardPage').classList.remove('hidden');
            } else {
                error.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
