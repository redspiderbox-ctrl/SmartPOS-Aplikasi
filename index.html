<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    .sidebar { transition: transform 0.3s ease-in-out; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .pos-item:active { transform: scale(0.95); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
  </style>
</head>
<body class="overflow-hidden h-screen">

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="flex items-center justify-center h-screen bg-gradient-to-br from-slate-900 to-slate-700">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-96 fade-in">
      <div class="text-center mb-6">
        <div class="bg-slate-800 text-white w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
          <i class="fas fa-cash-register text-2xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-slate-800">KasirPOS</h2>
        <p class="text-slate-500 text-sm">Silakan login untuk melanjutkan</p>
      </div>
      <div class="space-y-4">
        <div class="relative">
          <i class="fas fa-user absolute left-3 top-3.5 text-slate-400"></i>
          <input type="text" id="username" placeholder="Username" class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-800 outline-none transition">
        </div>
        <div class="relative">
          <i class="fas fa-lock absolute left-3 top-3.5 text-slate-400"></i>
          <input type="password" id="password" placeholder="Password" class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-800 outline-none transition">
        </div>
        <button onclick="handleLogin()" id="btnLogin" class="w-full bg-slate-800 hover:bg-slate-900 text-white py-3 rounded-xl font-semibold transition flex justify-center items-center">
          <span id="loginText">Login</span>
          <i id="loginSpinner" class="fas fa-spinner fa-spin ml-2 hidden"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- MAIN APP (Diperbaiki: tidak ada class hidden dan flex bersamaan) -->
  <div id="mainApp" style="display: none;" class="h-screen">
    <div class="flex h-full">
      <!-- Sidebar -->
      <div id="sidebar" class="w-64 bg-white border-r border-slate-200 flex flex-col fixed h-full z-20 transform -translate-x-full md:translate-x-0 sidebar">
        <div class="p-6 border-b border-slate-100">
          <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
            <i class="fas fa-cash-register text-slate-600"></i> KasirPOS
          </h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
          <button onclick="showPage('dashboard', this)" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 transition font-medium">
            <i class="fas fa-chart-pie w-5"></i> Dashboard
          </button>
          <button onclick="showPage('pos', this)" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 transition font-medium">
            <i class="fas fa-store w-5"></i> Kasir (POS)
          </button>
          <button onclick="showPage('products', this)" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 transition font-medium">
            <i class="fas fa-boxes-stacked w-5"></i> Produk
          </button>
        </nav>
        <div class="p-4 border-t border-slate-100">
          <button onclick="handleLogout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-500 hover:bg-red-50 transition font-medium">
            <i class="fas fa-sign-out-alt w-5"></i> Logout
          </button>
        </div>
      </div>

      <!-- Main Content -->
      <div class="flex-1 md:ml-64 overflow-y-auto h-full">
        <!-- Topbar Mobile -->
        <div class="md:hidden bg-white p-4 border-b border-slate-200 flex justify-between items-center sticky top-0 z-10">
          <button onclick="toggleSidebar()"><i class="fas fa-bars text-xl text-slate-700"></i></button>
          <h1 class="font-bold text-slate-800">KasirPOS</h1>
          <div></div>
        </div>

        <!-- PAGE: DASHBOARD -->
        <div id="page-dashboard" class="page p-6 hidden fade-in">
          <h2 class="text-2xl font-bold text-slate-800 mb-6">Dashboard</h2>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 card-hover transition">
              <div class="flex items-center justify-between mb-4">
                <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-blue-500"><i class="fas fa-money-bill-wave"></i></div>
                <span class="text-sm text-slate-500">Pendapatan</span>
              </div>
              <h3 class="text-3xl font-bold text-slate-800" id="dashRevenue">Rp 0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 card-hover transition">
              <div class="flex items-center justify-between mb-4">
                <div class="w-12 h-12 bg-green-50 rounded-xl flex items-center justify-center text-green-500"><i class="fas fa-receipt"></i></div>
                <span class="text-sm text-slate-500">Transaksi</span>
              </div>
              <h3 class="text-3xl font-bold text-slate-800" id="dashTx">0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 card-hover transition">
              <div class="flex items-center justify-between mb-4">
                <div class="w-12 h-12 bg-purple-50 rounded-xl flex items-center justify-center text-purple-500"><i class="fas fa-boxes-stacked"></i></div>
                <span class="text-sm text-slate-500">Total Produk</span>
              </div>
              <h3 class="text-3xl font-bold text-slate-800" id="dashProd">0</h3>
            </div>
          </div>
        </div>

        <!-- PAGE: POS -->
        <div id="page-pos" class="page hidden fade-in h-full">
          <div class="flex flex-col md:flex-row h-full">
            <!-- Produk List -->
            <div class="flex-1 p-6 overflow-y-auto bg-slate-50">
              <div class="flex justify-between items-center mb-6 sticky top-0 bg-slate-50 pt-2 pb-4 z-10">
                <h2 class="text-2xl font-bold text-slate-800">Kasir</h2>
                <input type="text" id="searchProduct" onkeyup="filterProducts()" placeholder="Cari produk..." class="border border-slate-200 rounded-xl px-4 py-2 w-48 focus:ring-2 focus:ring-slate-800 outline-none">
              </div>
              <div id="posProductList" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
            </div>

            <!-- Cart -->
            <div class="w-full md:w-96 bg-white border-l border-slate-200 flex flex-col h-full">
              <div class="p-6 border-b border-slate-100">
                <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                  <i class="fas fa-shopping-cart text-slate-500"></i> Keranjang <span id="cartCount" class="text-sm bg-slate-800 text-white px-2 py-0.5 rounded-full">0</span>
                </h3>
              </div>
              <div id="cartItems" class="flex-1 p-6 overflow-y-auto space-y-4">
                <p class="text-center text-slate-400 mt-10">Belum ada item</p>
              </div>
              <div class="p-6 border-t border-slate-100 bg-slate-50">
                <div class="flex justify-between mb-2 text-slate-600"><span>Subtotal</span><span id="cartSubtotal">Rp 0</span></div>
                <div class="flex justify-between mb-4 text-xl font-bold text-slate-800"><span>Total</span><span id="cartTotal">Rp 0</span></div>
                <button onclick="handleCheckout()" id="btnCheckout" class="w-full bg-slate-800 hover:bg-slate-900 text-white py-3 rounded-xl font-semibold transition disabled:opacity-50" disabled>
                  Bayar Sekarang
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- PAGE: PRODUCTS -->
        <div id="page-products" class="page p-6 hidden fade-in">
          <h2 class="text-2xl font-bold text-slate-800 mb-6">Manajemen Produk</h2>
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="border-b border-slate-100 bg-slate-50 text-slate-600 text-sm">
                  <th class="p-4">ID</th><th class="p-4">Nama Produk</th><th class="p-4">Kategori</th><th class="p-4">Harga</th><th class="p-4">Stok</th>
                </tr>
              </thead>
              <tbody id="productTableBody" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script>
    let cart = [];
    let products = [];
    let currentUser = null;

    // --- AUTH SYSTEM ---
    function handleLogin() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      if(!u || !p) return alert('Masukkan username dan password!');
      
      document.getElementById('loginText').classList.add('hidden');
      document.getElementById('loginSpinner').classList.remove('hidden');
      
      google.script.run.withSuccessHandler(res => {
        document.getElementById('loginText').classList.remove('hidden');
        document.getElementById('loginSpinner').classList.add('hidden');
        
        if(res.success) {
          currentUser = res.user;
          // PERBAIKAN: Menggunakan style display untuk menghindari konflik class Tailwind
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('mainApp').style.display = 'block';
          initApp();
        } else {
          alert('Username atau password salah!');
        }
      }).verifyLogin(u, p);
    }

    function handleLogout() {
      currentUser = null;
      cart = [];
      document.getElementById('mainApp').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }

    // --- NAVIGATION ---
    // PERBAIKAN: Mengirim element 'el' secara langsung agar tidak error
    function showPage(pageId, el) {
      document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
      document.getElementById(`page-${pageId}`).classList.remove('hidden');
      
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('bg-slate-100', 'text-slate-900'));
      if(el) el.classList.add('bg-slate-100', 'text-slate-900');
      
      if(window.innerWidth < 768) toggleSidebar();
    }

    function toggleSidebar() {
      const sb = document.getElementById('sidebar');
      sb.classList.toggle('-translate-x-full');
    }

    // --- APP INIT ---
    function initApp() {
      // PERBAIKAN: Set class active ke menu pertama saat pertama kali load
      const firstBtn = document.querySelector('.nav-btn');
      if(firstBtn) showPage('dashboard', firstBtn);

      google.script.run.withSuccessHandler(res => {
        document.getElementById('dashRevenue').innerText = formatCurrency(res.revenue);
        document.getElementById('dashTx').innerText = res.transactions;
      }).getDashboardData();

      google.script.run.withSuccessHandler(data => {
        products = data;
        document.getElementById('dashProd').innerText = data.length;
        renderPosProducts(data);
        renderProductTable(data);
      }).getProducts();
    }

    // --- POS LOGIC ---
    function renderPosProducts(data) {
      const container = document.getElementById('posProductList');
      container.innerHTML = '';
      data.forEach(p => {
        container.innerHTML += `
          <div onclick="addToCart('${p.id}')" class="bg-white p-4 rounded-xl border border-slate-100 cursor-pointer pos-item transition hover:border-slate-300 flex flex-col justify-between shadow-sm">
            <div class="w-full h-20 bg-slate-50 rounded-lg flex items-center justify-center text-slate-300 mb-3">
              <i class="fas fa-box text-2xl"></i>
            </div>
            <h4 class="font-semibold text-slate-800 text-sm truncate">${p.name}</h4>
            <p class="text-slate-500 text-xs mt-1">Stok: ${p.stock}</p>
            <p class="text-slate-800 font-bold mt-2">${formatCurrency(p.price)}</p>
          </div>
        `;
      });
    }

    function filterProducts() {
      const q = document.getElementById('searchProduct').value.toLowerCase();
      const filtered = products.filter(p => p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q));
      renderPosProducts(filtered);
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      const existing = cart.find(c => c.id === id);
      
      if(existing) {
        if(existing.qty < product.stock) existing.qty++;
        else return alert('Stok tidak mencukupi!');
      } else {
        cart.push({ id: product.id, name: product.name, price: product.price, qty: 1 });
      }
      renderCart();
    }

    function removeFromCart(id) {
      cart = cart.filter(c => c.id !== id);
      renderCart();
    }

    function changeQty(id, delta) {
      const item = cart.find(c => c.id === id);
      const product = products.find(p => p.id === id);
      item.qty += delta;
      
      if(item.qty <= 0) return removeFromCart(id);
      if(item.qty > product.stock) return alert('Stok tidak mencukupi!');
      renderCart();
    }

    function renderCart() {
      const container = document.getElementById('cartItems');
      const checkoutBtn = document.getElementById('btnCheckout');
      
      if(cart.length === 0) {
        container.innerHTML = '<p class="text-center text-slate-400 mt-10">Belum ada item</p>';
        checkoutBtn.disabled = true;
      } else {
        checkoutBtn.disabled = false;
        let html = '';
        let total = 0;
        cart.forEach(c => {
          const sub = c.price * c.qty;
          total += sub;
          html += `
            <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
              <div class="flex-1">
                <h4 class="font-medium text-slate-800 text-sm">${c.name}</h4>
                <p class="text-xs text-slate-500">${formatCurrency(c.price)}</p>
              </div>
              <div class="flex items-center gap-2">
                <button onclick="changeQty('${c.id}', -1)" class="w-7 h-7 bg-white border border-slate-200 rounded-lg flex items-center justify-center text-slate-600 hover:bg-slate-100 transition text-xs"><i class="fas fa-minus"></i></button>
                <span class="w-5 text-center text-sm font-semibold">${c.qty}</span>
                <button onclick="changeQty('${c.id}', 1)" class="w-7 h-7 bg-white border border-slate-200 rounded-lg flex items-center justify-center text-slate-600 hover:bg-slate-100 transition text-xs"><i class="fas fa-plus"></i></button>
                <button onclick="removeFromCart('${c.id}')" class="ml-2 text-red-400 hover:text-red-600 transition text-xs"><i class="fas fa-trash"></i></button>
              </div>
            </div>
          `;
        });
        container.innerHTML = html;
        document.getElementById('cartSubtotal').innerText = formatCurrency(total);
        document.getElementById('cartTotal').innerText = formatCurrency(total);
      }
      document.getElementById('cartCount').innerText = cart.reduce((a, b) => a + b.qty, 0);
    }

    function handleCheckout() {
      if(!confirm('Proses pembayaran?')) return;
      const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
      const itemNames = cart.map(c => `${c.name}(${c.qty})`).join(', ');
      
      const payload = { items: itemNames, total: total, cashier: currentUser };
      
      document.getElementById('btnCheckout').innerText = 'Memproses...';
      document.getElementById('btnCheckout').disabled = true;
      
      google.script.run.withSuccessHandler(res => {
        alert(`Transaksi berhasil!\nInvoice: ${res.invoice}`);
        cart = [];
        renderCart();
        document.getElementById('btnCheckout').innerText = 'Bayar Sekarang';
        initApp(); 
      }).saveTransaction(payload);
    }

    // --- PRODUCT TABLE ---
    function renderProductTable(data) {
      const tbody = document.getElementById('productTableBody');
      tbody.innerHTML = '';
      data.forEach(p => {
        tbody.innerHTML += `
          <tr class="hover:bg-slate-50 transition">
            <td class="p-4 text-slate-500 text-sm">${p.id}</td>
            <td class="p-4 font-medium text-slate-800">${p.name}</td>
            <td class="p-4 text-slate-600">${p.category}</td>
            <td class="p-4 font-semibold text-slate-800">${formatCurrency(p.price)}</td>
            <td class="p-4"><span class="px-2 py-1 rounded-lg text-xs font-semibold ${p.stock > 0 ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}">${p.stock}</span></td>
          </tr>
        `;
      });
    }

    // --- UTILS ---
    function formatCurrency(num) {
      return 'Rp ' + Number(num).toLocaleString('id-ID');
    }

    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
