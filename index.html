<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern POS Kasir</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Font Modern -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { 'inter': ['Inter', 'sans-serif'] },
          colors: { primary: '#4F46E5', secondary: '#10B981' }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .sidebar-link:hover, .sidebar-link.active { background: rgba(255,255,255,0.1); }
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 10px; }
  </style>
</head>
<body class="bg-gray-100 font-inter text-gray-800">

  <!-- LOGIN VIEW -->
  <div id="loginView" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-500 to-purple-600">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md fade-in">
      <div class="text-center mb-6">
        <i class="fas fa-cash-register text-5xl text-primary mb-3"></i>
        <h2 class="text-2xl font-bold text-gray-800">KasirPOS Pro</h2>
        <p class="text-gray-500 text-sm">Silakan login untuk melanjutkan</p>
      </div>
      <div id="loginError" class="hidden bg-red-100 text-red-700 p-3 rounded-lg mb-4 text-sm"></div>
      <form id="loginForm">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center"><i class="fas fa-user text-gray-400"></i></span>
            <input type="text" id="username" class="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary focus:outline-none" placeholder="admin" required>
          </div>
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center"><i class="fas fa-lock text-gray-400"></i></span>
            <input type="password" id="password" class="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary focus:outline-none" placeholder="••••" required>
          </div>
        </div>
        <button type="submit" class="w-full bg-primary hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition duration-300">Login</button>
      </form>
    </div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="dashboardView" class="hidden min-h-screen flex">
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col">
      <div class="p-6 flex items-center gap-3 border-b border-gray-700">
        <i class="fas fa-store text-2xl text-primary"></i>
        <h1 class="text-xl font-bold">KasirPOS</h1>
      </div>
      <nav class="flex-1 p-4 space-y-2">
        <a href="#" onclick="switchTab('pos')" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-lg transition" id="nav-pos">
          <i class="fas fa-point-of-sale w-5 text-center"></i> Kasir
        </a>
        <a href="#" onclick="switchTab('products')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg transition" id="nav-products">
          <i class="fas fa-boxes-stacked w-5 text-center"></i> Produk
        </a>
        <a href="#" onclick="switchTab('history')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg transition" id="nav-history">
          <i class="fas fa-receipt w-5 text-center"></i> Riwayat
        </a>
      </nav>
      <div class="p-4 border-t border-gray-700">
        <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-red-600 transition">
          <i class="fas fa-sign-out-alt w-5 text-center"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden">
      <!-- Top Bar -->
      <header class="bg-white p-4 shadow-sm flex justify-between items-center">
        <h2 class="text-xl font-semibold text-gray-700" id="pageTitle">Kasir</h2>
        <div class="flex items-center gap-4">
          <span class="text-sm text-gray-500"><i class="fas fa-calendar-alt mr-1"></i> <span id="currentDate"></span></span>
          <div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center text-primary font-bold">A</div>
        </div>
      </header>

      <!-- Tab: Kasir (POS) -->
      <div id="tab-pos" class="flex-1 p-6 flex gap-6 overflow-hidden fade-in">
        <!-- Product List -->
        <div class="flex-1 bg-white p-4 rounded-xl shadow-sm overflow-y-auto">
          <div class="flex justify-between items-center mb-4">
            <h3 className="font-semibold text-gray-700">Menu Produk</h3>
            <input type="text" id="searchProduct" onkeyup="filterProducts()" placeholder="Cari produk..." class="border px-3 py-1 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-primary">
          </div>
          <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            <!-- Products injected via JS -->
          </div>
        </div>

        <!-- Cart -->
        <div class="w-96 bg-white p-4 rounded-xl shadow-sm flex flex-col">
          <h3 className="font-semibold text-gray-700 mb-4"><i class="fas fa-shopping-cart mr-2 text-primary"></i>Keranjang</h3>
          <div id="cartList" class="flex-1 overflow-y-auto border-b mb-4">
            <div id="emptyCart" class="h-full flex items-center justify-center text-gray-400 text-sm">Keranjang kosong</div>
          </div>
          <div class="space-y-2">
            <div class="flex justify-between font-semibold text-lg">
              <span>Total:</span>
              <span id="cartTotal" class="text-secondary">Rp 0</span>
            </div>
            <button onclick="checkout()" class="w-full bg-secondary hover:bg-green-600 text-white font-semibold py-3 rounded-lg transition duration-300 flex items-center justify-center gap-2">
              <i class="fas fa-credit-card"></i> Bayar Sekarang
            </button>
          </div>
        </div>
      </div>

      <!-- Tab: Products -->
      <div id="tab-products" class="hidden flex-1 p-6 bg-white m-6 rounded-xl shadow-sm fade-in">
        <h3 className="font-semibold text-xl text-gray-700 mb-4">Stok Produk</h3>
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b text-gray-500 text-sm">
              <th class="py-2">ID</th><th>Nama Produk</th><th>Harga</th><th>Stok</th>
            </tr>
          </thead>
          <tbody id="productTable" class="text-sm text-gray-700"></tbody>
        </table>
      </div>

      <!-- Tab: History (Dummy) -->
      <div id="tab-history" class="hidden flex-1 p-6 bg-white m-6 rounded-xl shadow-sm fade-in">
        <h3 className="font-semibold text-xl text-gray-700 mb-4">Riwayat Transaksi</h3>
        <p class="text-gray-500 text-sm">Data transaksi akan muncul di sini setelah integrasi sheet transaksi.</p>
      </div>

    </main>
  </div>

  <script>
    // --- KONFIGURASI API ---
    const API_URL = 'https://script.google.com/macros/s/AKfycbyecM-qYWc3anHF4UeO8jIEVZNQEnvk45gDylz3aSJLkg93mS8oLDdYfP8TPvx-wm-v/exec';
    
    let products = [];
    let cart = [];

    // --- INIT ---
    document.addEventListener('DOMContentLoaded', () => {
      const dateEl = document.getElementById('currentDate');
      if(dateEl) dateEl.innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    });

    // --- AUTH SYSTEM ---
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      
      try {
        const res = await fetch(`${API_URL}?action=login&username=${user}&password=${pass}`);
        const data = await res.json();
        
        if(data.success) {
          localStorage.setItem('posSession', true);
          document.getElementById('loginView').classList.add('hidden');
          document.getElementById('dashboardView').classList.remove('hidden');
          loadProducts();
        } else {
          const errEl = document.getElementById('loginError');
          errEl.textContent = data.message;
          errEl.classList.remove('hidden');
        }
      } catch (error) {
        alert('Gagal terhubung ke server. Pastikan Web App URL benar dan di-deploy dengan benar.');
      }
    });

    function logout() {
      localStorage.removeItem('posSession');
      document.getElementById('dashboardView').classList.add('hidden');
      document.getElementById('loginView').classList.remove('hidden');
    }

    // --- PRODUCT SYSTEM ---
    async function loadProducts() {
      try {
        const res = await fetch(`${API_URL}?action=getProducts`);
        const data = await res.json();
        if(data.success) {
          products = data.data;
          renderProducts();
          renderProductTable();
        }
      } catch(e) {
        console.error("Failed to load products", e);
      }
    }

    function renderProducts(filter = '') {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '';
      const filtered = products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
      
      filtered.forEach(p => {
        grid.innerHTML += `
          <div onclick="addToCart(${p.id})" class="border rounded-xl p-4 cursor-pointer hover:border-primary hover:shadow-md transition duration-200 flex flex-col justify-between h-32 ${p.stock <= 0 ? 'opacity-50 pointer-events-none' : ''}">
            <div>
              <h4 class="font-semibold text-gray-800 text-sm leading-tight">${p.name}</h4>
              <p class="text-xs text-gray-500 mt-1">Stok: ${p.stock}</p>
            </div>
            <p class="text-primary font-bold mt-2">Rp ${Number(p.price).toLocaleString('id-ID')}</p>
          </div>
        `;
      });
    }

    function renderProductTable() {
      const tbody = document.getElementById('productTable');
      tbody.innerHTML = '';
      products.forEach(p => {
        tbody.innerHTML += `
          <tr class="border-b">
            <td class="py-3">${p.id}</td>
            <td>${p.name}</td>
            <td>Rp ${Number(p.price).toLocaleString('id-ID')}</td>
            <td><span class="${p.stock < 5 ? 'text-red-500 font-semibold' : 'text-secondary'}">${p.stock}</span></td>
          </tr>
        `;
      });
    }

    function filterProducts() {
      const q = document.getElementById('searchProduct').value;
      renderProducts(q);
    }

    // --- CART SYSTEM ---
    function addToCart(id) {
      const product = products.find(p => p.id === id);
      if(!product || product.stock <= 0) return;

      const existing = cart.find(item => item.id === id);
      if(existing) {
        if(existing.qty < product.stock) existing.qty++;
        else alert('Stok tidak mencukupi!');
      } else {
        cart.push({ id: product.id, name: product.name, price: product.price, qty: 1 });
      }
      renderCart();
    }

    function removeFromCart(id) {
      cart = cart.filter(item => item.id !== id);
      renderCart();
    }

    function renderCart() {
      const list = document.getElementById('cartList');
      const empty = document.getElementById('emptyCart');
      const totalEl = document.getElementById('cartTotal');
      
      if(cart.length === 0) {
        list.innerHTML = '<div id="emptyCart" class="h-full flex items-center justify-center text-gray-400 text-sm">Keranjang kosong</div>';
        totalEl.innerText = 'Rp 0';
        return;
      }

      list.innerHTML = '';
      let total = 0;
      cart.forEach(item => {
        const subtotal = item.price * item.qty;
        total += subtotal;
        list.innerHTML += `
          <div class="flex justify-between items-center py-2 border-b last:border-0 fade-in">
            <div class="flex-1">
              <p class="text-sm font-medium text-gray-800">${item.name}</p>
              <p class="text-xs text-gray-500">${item.qty} x Rp ${Number(item.price).toLocaleString('id-ID')}</p>
            </div>
            <div class="flex items-center gap-3">
              <span class="text-sm font-semibold text-gray-700">Rp ${Number(subtotal).toLocaleString('id-ID')}</span>
              <button onclick="removeFromCart(${item.id})" class="text-red-400 hover:text-red-600 transition"><i class="fas fa-trash-alt text-xs"></i></button>
            </div>
          </div>
        `;
      });
      totalEl.innerText = `Rp ${Number(total).toLocaleString('id-ID')}`;
    }

    function checkout() {
      if(cart.length === 0) return alert('Keranjang masih kosong!');
      alert('Checkout berhasil! (Integrasi pengurangan stok ke Sheet bisa ditambahkan pada fungsi doPost)');
      cart = [];
      renderCart();
    }

    // --- NAVIGATION ---
    function switchTab(tab) {
      document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
      
      document.getElementById(`tab-${tab}`).classList.remove('hidden');
      document.getElementById(`nav-${tab}`).classList.add('active');
      
      const titles = { pos: 'Kasir', products: 'Manajemen Produk', history: 'Riwayat Transaksi' };
      document.getElementById('pageTitle').innerText = titles[tab];
    }
  </script>
</body>
</html>
