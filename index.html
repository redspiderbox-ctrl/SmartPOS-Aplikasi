<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS Kasir Modern</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .sidebar-link:hover { background: rgba(255,255,255,0.1); }
    .sidebar-link.active { background: rgba(255,255,255,0.2); border-left: 4px solid #fff; }
  </style>
</head>
<body class="text-gray-800">

  <!-- PENTING: GANTI URL INI DENGAN URL GOOGLE APPS SCRIPT ANDA -->
  <script>
    const API_URL = "MASUKKAN_URL_WEB_APP_GOOGLE_SCRIPT_ANDA_DISINI";
  </script>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 to-purple-800">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md fade-in">
      <h2 class="text-3xl font-bold text-center text-indigo-700 mb-2">POS Kasir</h2>
      <p class="text-center text-gray-500 mb-6">Silakan login untuk melanjutkan</p>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700">Username</label>
        <input type="text" id="username" class="mt-1 w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" value="admin">
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" id="password" class="mt-1 w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" value="admin123">
      </div>
      <button onclick="login()" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition font-semibold">
        <i class="fas fa-sign-in-alt mr-2"></i> Login
      </button>
      <p id="login-error" class="text-red-500 text-sm mt-4 text-center hidden"></p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" class="hidden min-h-screen flex">
    
    <!-- SIDEBAR KIRI -->
    <aside class="w-64 bg-gradient-to-b from-gray-900 to-gray-800 text-white flex flex-col hidden md:flex">
      <div class="p-6 border-b border-gray-700">
        <h1 class="text-2xl font-bold tracking-wider"><i class="fas fa-store mr-2"></i> POS Pro</h1>
      </div>
      <nav class="flex-1 p-4 space-y-2">
        <a href="#" onclick="showPage('dashboard')" class="sidebar-link active flex items-center px-4 py-3 rounded-lg transition" id="nav-dashboard">
          <i class="fas fa-tachometer-alt w-6"></i> Dashboard
        </a>
        <a href="#" onclick="showPage('kasir')" class="sidebar-link flex items-center px-4 py-3 rounded-lg transition" id="nav-kasir">
          <i class="fas fa-cash-register w-6"></i> Kasir
        </a>
      </nav>
      <div class="p-4 border-t border-gray-700">
        <button onclick="logout()" class="w-full bg-red-500 hover:bg-red-600 py-2 rounded-lg transition">
          <i class="fas fa-sign-out-alt mr-2"></i> Logout
        </button>
      </div>
    </aside>

    <!-- MOBILE NAV -->
    <div class="md:hidden fixed bottom-0 w-full bg-gray-900 flex z-50 border-t border-gray-700">
      <button onclick="showPage('dashboard')" class="flex-1 py-3 text-center text-white hover:bg-gray-800" id="mob-nav-dashboard">
        <i class="fas fa-tachometer-alt text-xl"></i>
      </button>
      <button onclick="showPage('kasir')" class="flex-1 py-3 text-center text-gray-400 hover:bg-gray-800" id="mob-nav-kasir">
        <i class="fas fa-cash-register text-xl"></i>
      </button>
    </div>

    <!-- CONTENT -->
    <main class="flex-1 p-6 pb-20 md:pb-6 overflow-y-auto">
      
      <!-- DASHBOARD PAGE -->
      <div id="page-dashboard" class="fade-in">
        <h2 class="text-2xl font-bold mb-6">Dashboard</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-4">
            <div class="bg-green-100 p-4 rounded-full text-green-600"><i class="fas fa-money-bill-wave text-2xl"></i></div>
            <div>
              <p class="text-gray-500 text-sm">Total Pendapatan</p>
              <h3 class="text-2xl font-bold" id="dash-revenue">Rp 0</h3>
            </div>
          </div>
          <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-4">
            <div class="bg-blue-100 p-4 rounded-full text-blue-600"><i class="fas fa-receipt text-2xl"></i></div>
            <div>
              <p class="text-gray-500 text-sm">Total Transaksi</p>
              <h3 class="text-2xl font-bold" id="dash-transactions">0</h3>
            </div>
          </div>
        </div>
        
        <div class="mt-8 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
          <h3 class="font-semibold mb-4 text-lg">Teknologi yang Digunakan</h3>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center text-sm">
            <div class="p-4 border rounded-lg hover:shadow-md transition"><i class="fab fa-html5 text-3xl text-orange-500 mb-2"></i><br>HTML</div>
            <div class="p-4 border rounded-lg hover:shadow-md transition"><i class="fab fa-css3-alt text-3xl text-blue-500 mb-2"></i><br>CSS/Tailwind</div>
            <div class="p-4 border rounded-lg hover:shadow-md transition"><i class="fab fa-js-square text-3xl text-yellow-500 mb-2"></i><br>JavaScript</div>
            <div class="p-4 border rounded-lg hover:shadow-md transition"><i class="fas fa-table text-3xl text-green-600 mb-2"></i><br>G-Sheets DB</div>
          </div>
        </div>
      </div>

      <!-- KASIR PAGE -->
      <div id="page-kasir" class="hidden fade-in">
        <h2 class="text-2xl font-bold mb-6">Kasir (Point of Sale)</h2>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          
          <!-- Product List -->
          <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <h3 class="font-semibold mb-4">Menu Produk</h3>
            <div id="product-list" class="grid grid-cols-2 md:grid-cols-3 gap-4">
              <p class="text-gray-400 col-span-3 text-center py-10">Memuat produk...</p>
            </div>
          </div>

          <!-- Cart -->
          <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
            <h3 class="font-semibold mb-4 border-b pb-2">Keranjang Belanja</h3>
            <div id="cart-list" class="flex-1 overflow-y-auto max-h-64 mb-4 space-y-3">
              <p class="text-gray-400 text-center text-sm py-10">Keranjang kosong</p>
            </div>
            <div class="border-t pt-4 mt-auto">
              <div class="flex justify-between font-bold text-xl mb-4">
                <span>Total:</span>
                <span id="cart-total">Rp 0</span>
              </div>
              <button onclick="checkout()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-lg transition font-bold">
                <i class="fas fa-check-circle mr-2"></i> Bayar
              </button>
            </div>
          </div>

        </div>
      </div>

    </main>
  </div>

  <script>
    let cart = [];
    let products = [];

    // API CALL WRAPPER
    async function apiCall(method, payload) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: method, payload: payload })
        });
        return await response.json();
      } catch (error) {
        console.error("API Error:", error);
        return { success: false, message: "Koneksi ke server gagal" };
      }
    }

    // LOGIN
    async function login() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const res = await apiCall('verifyLogin', { username: u, password: p });
      if (res.success) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        loadInitialData();
      } else {
        const errEl = document.getElementById('login-error');
        errEl.textContent = res.message;
        errEl.classList.remove('hidden');
      }
    }

    function logout() {
      document.getElementById('main-app').classList.add('hidden');
      document.getElementById('login-screen').classList.remove('hidden');
      cart = [];
    }

    // NAVIGATION
    function showPage(page) {
      document.getElementById('page-dashboard').classList.add('hidden');
      document.getElementById('page-kasir').classList.add('hidden');
      document.getElementById('page-' + page).classList.remove('hidden');
      document.getElementById('page-' + page).classList.add('fade-in');

      // Active state
      document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('[id^="mob-nav-"]').forEach(el => el.classList.remove('text-white'));
      
      const navEl = document.getElementById('nav-' + page);
      const mobNavEl = document.getElementById('mob-nav-' + page);
      if(navEl) navEl.classList.add('active');
      if(mobNavEl) mobNavEl.classList.add('text-white');
    }

    // LOAD DATA
    async function loadInitialData() {
      const dashData = await apiCall('getDashboardData', {});
      if(dashData) {
        document.getElementById('dash-revenue').innerText = formatRupiah(dashData.totalRevenue);
        document.getElementById('dash-transactions').innerText = dashData.totalTransactions;
      }

      products = await apiCall('getProducts', {});
      renderProducts();
    }

    // PRODUCTS & CART
    function renderProducts() {
      const container = document.getElementById('product-list');
      if(products.length === 0) {
        container.innerHTML = '<p class="text-gray-400 col-span-3 text-center py-10">Tidak ada produk</p>';
        return;
      }
      container.innerHTML = products.map(p => `
        <div onclick="addToCart('${p.id}')" class="border rounded-lg p-4 cursor-pointer hover:bg-indigo-50 hover:border-indigo-300 transition flex flex-col items-center justify-center text-center">
          <i class="fas fa-box text-3xl text-indigo-400 mb-2"></i>
          <h4 class="font-semibold text-sm">${p.name}</h4>
          <p class="text-indigo-600 font-bold mt-1">${formatRupiah(p.price)}</p>
        </div>
      `).join('');
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      const existingItem = cart.find(c => c.id === id);
      
      if(existingItem) {
        existingItem.qty += 1;
      } else {
        cart.push({ ...product, qty: 1 });
      }
      renderCart();
    }

    function removeFromCart(id) {
      cart = cart.filter(c => c.id !== id);
      renderCart();
    }

    function renderCart() {
      const container = document.getElementById('cart-list');
      let total = 0;
      
      if(cart.length === 0) {
        container.innerHTML = '<p class="text-gray-400 text-center text-sm py-10">Keranjang kosong</p>';
      } else {
        container.innerHTML = cart.map(c => {
          const subTotal = c.price * c.qty;
          total += subTotal;
          return `
            <div class="flex justify-between items-center bg-gray-50 p-2 rounded-lg">
              <div>
                <p class="font-medium text-sm">${c.name}</p>
                <p class="text-xs text-gray-500">${c.qty}x ${formatRupiah(c.price)}</p>
              </div>
              <div class="flex items-center space-x-2">
                <span class="font-semibold text-sm">${formatRupiah(subTotal)}</span>
                <button onclick="removeFromCart('${c.id}')" class="text-red-400 hover:text-red-600 text-xs"><i class="fas fa-times"></i></button>
              </div>
            </div>
          `;
        }).join('');
      }
      document.getElementById('cart-total').innerText = formatRupiah(total);
    }

    // CHECKOUT
    async function checkout() {
      if(cart.length === 0) return alert("Keranjang kosong!");
      
      const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      const itemNames = cart.map(c => `${c.name} (${c.qty})`).join(", ");
      
      const res = await apiCall('saveTransaction', { items: itemNames, total: total });
      
      if(res.success) {
        alert("Pembayaran Berhasil!\nInvoice: " + res.invoice);
        cart = [];
        renderCart();
        loadInitialData(); // Refresh dashboard
      } else {
        alert("Gagal menyimpan transaksi");
      }
    }

    // UTILITY
    function formatRupiah(num) {
      return 'Rp ' + Number(num).toLocaleString('id-ID');
    }
  </script>
</body>
</html>
