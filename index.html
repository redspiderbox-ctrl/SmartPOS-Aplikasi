<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern POS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .sidebar-link:hover { background: rgba(255,255,255,0.1); }
    .sidebar-link.active { background: rgba(255,255,255,0.2); border-left: 4px solid #fff; }
  </style>
</head>
<body class="text-gray-800">

  <!-- API URL CONFIG -->
  <script>
    // GANTI INI DENGAN URL WEB APP ANDA SETELAH DEPLOY
    const API_URL = 'https://script.google.com/macros/s/AKfycbzKtc5GBsEwTdffDFxAvO9I8wHYW5vllJPLmACTZ4UsdIeiNfpwG608dKk8Hm6yGI3k/exec';
  </script>

  <!-- LOGIN VIEW -->
  <div id="loginView" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 to-purple-700">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md fade-in">
      <div class="text-center mb-6">
        <i class="fas fa-cash-register text-indigo-600 text-4xl mb-3"></i>
        <h1 class="text-2xl font-bold text-gray-800">KasirPOS</h1>
        <p class="text-gray-500 text-sm">Silakan login untuk melanjutkan</p>
      </div>
      <div id="loginError" class="hidden bg-red-100 text-red-700 p-3 rounded-lg text-sm mb-4 fade-in"></div>
      <div class="space-y-4">
        <div class="relative">
          <i class="fas fa-user absolute left-3 top-3.5 text-gray-400"></i>
          <input type="text" id="loginUsername" placeholder="Username" class="w-full pl-10 pr-4 py-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
        </div>
        <div class="relative">
          <i class="fas fa-lock absolute left-3 top-3.5 text-gray-400"></i>
          <input type="password" id="loginPassword" placeholder="Password" class="w-full pl-10 pr-4 py-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
        </div>
        <button onclick="handleLogin()" id="btnLogin" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-semibold transition flex justify-center items-center">
          <span id="loginText">Login</span>
          <i class="fas fa-spinner fa-spin ml-2 hidden" id="loginSpinner"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="dashboardView" class="hidden min-h-screen flex">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-gray-900 text-white flex-col hidden md:flex transition-all">
      <div class="p-6 border-b border-gray-700">
        <h2 class="text-xl font-bold"><i class="fas fa-store mr-2"></i> KasirPOS</h2>
      </div>
      <nav class="flex-1 p-4 space-y-2">
        <a href="#" onclick="switchTab('pos')" class="sidebar-link active flex items-center p-3 rounded-lg transition" id="nav-pos">
          <i class="fas fa-cash-register w-6"></i> Kasir
        </a>
        <a href="#" onclick="switchTab('products')" class="sidebar-link flex items-center p-3 rounded-lg transition" id="nav-products">
          <i class="fas fa-boxes-stacked w-6"></i> Produk
        </a>
        <a href="#" onclick="switchTab('history')" class="sidebar-link flex items-center p-3 rounded-lg transition" id="nav-history">
          <i class="fas fa-receipt w-6"></i> Riwayat
        </a>
      </nav>
      <div class="p-4 border-t border-gray-700">
        <div class="flex items-center space-x-3 mb-4">
          <div class="bg-indigo-500 w-10 h-10 rounded-full flex items-center justify-center font-bold">A</div>
          <div>
            <p class="font-semibold text-sm" id="loggedUser">admin</p>
            <p class="text-xs text-gray-400" id="loggedRole">admin123</p>
          </div>
        </div>
        <button onclick="handleLogout()" class="w-full bg-red-600 hover:bg-red-700 py-2 rounded-lg text-sm font-semibold transition">
          <i class="fas fa-sign-out-alt mr-1"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto">
      <!-- Mobile Header -->
      <div class="md:hidden bg-gray-900 text-white p-4 flex justify-between items-center">
        <h2 class="font-bold"><i class="fas fa-store mr-2"></i> KasirPOS</h2>
        <button onclick="toggleMobileMenu()"><i class="fas fa-bars text-xl"></i></button>
      </div>

      <!-- POS TAB -->
      <div id="tab-pos" class="p-6 fade-in">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Transaksi Baru</h2>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <!-- Product List -->
          <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
            <div class="mb-4">
              <input type="text" id="searchProduct" oninput="renderProducts()" placeholder="Cari produk..." class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 gap-4 max-h-[60vh] overflow-y-auto">
              <!-- Products will be injected here -->
            </div>
          </div>

          <!-- Cart -->
          <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100 flex flex-col">
            <h3 class="text-lg font-bold mb-4 border-b pb-2"><i class="fas fa-shopping-cart text-indigo-600 mr-2"></i> Keranjang</h3>
            <div id="cartList" class="flex-1 overflow-y-auto mb-4 space-y-3">
              <p class="text-gray-400 text-center text-sm py-10">Keranjang kosong</p>
            </div>
            <div class="border-t pt-4 space-y-2">
              <div class="flex justify-between font-semibold text-lg">
                <span>Total:</span>
                <span id="cartTotal" class="text-indigo-600">Rp 0</span>
              </div>
              <button onclick="handleCheckout()" id="btnCheckout" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-semibold transition mt-2">
                Bayar Sekarang
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- PRODUCTS TAB -->
      <div id="tab-products" class="p-6 hidden fade-in">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Manajemen Stok</h2>
        <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="border-b text-gray-500 text-sm">
                <th class="pb-3 font-medium">ID</th>
                <th class="pb-3 font-medium">Nama Produk</th>
                <th class="pb-3 font-medium">Harga</th>
                <th class="pb-3 font-medium">Stok</th>
              </tr>
            </thead>
            <tbody id="productTable" class="divide-y divide-gray-100">
              <!-- Data will be injected here -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- HISTORY TAB -->
      <div id="tab-history" class="p-6 hidden fade-in">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Riwayat Transaksi</h2>
        <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
          <p class="text-gray-500 text-center py-10">Fitur riwayat menampilkan data dari sheet Transactions.</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    // STATE
    let cart = [];
    let products = [];
    let currentUser = null;

    // LOGIN LOGIC
    async function handleLogin() {
      const u = document.getElementById('loginUsername').value;
      const p = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('loginError');
      
      if(!u || !p) { errEl.textContent = 'Harap isi semua field!'; errEl.classList.remove('hidden'); return; }
      
      document.getElementById('loginText').classList.add('hidden');
      document.getElementById('loginSpinner').classList.remove('hidden');
      
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'login', username: u, password: p })
        });
        const data = await res.json();
        
        if (data.success) {
          currentUser = data.user;
          document.getElementById('loggedUser').textContent = data.user.username;
          document.getElementById('loggedRole').textContent = data.user.role;
          document.getElementById('loginView').classList.add('hidden');
          document.getElementById('dashboardView').classList.remove('hidden');
          loadProducts();
        } else {
          errEl.textContent = data.message;
          errEl.classList.remove('hidden');
        }
      } catch (e) {
        errEl.textContent = 'Gagal terhubung ke server. Cek API URL!';
        errEl.classList.remove('hidden');
      } finally {
        document.getElementById('loginText').classList.remove('hidden');
        document.getElementById('loginSpinner').classList.add('hidden');
      }
    }

    function handleLogout() {
      currentUser = null;
      cart = [];
      document.getElementById('dashboardView').classList.add('hidden');
      document.getElementById('loginView').classList.remove('hidden');
      document.getElementById('loginUsername').value = '';
      document.getElementById('loginPassword').value = '';
    }

    // PRODUCTS LOGIC
    async function loadProducts() {
      try {
        const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'getProducts' }) });
        const data = await res.json();
        if(data.success) {
          products = data.data;
          renderProducts();
          renderProductTable();
        }
      } catch (e) {
        alert('Gagal memuat produk');
      }
    }

    function renderProducts() {
      const search = document.getElementById('searchProduct').value.toLowerCase();
      const filtered = products.filter(p => p.name.toLowerCase().includes(search));
      const grid = document.getElementById('productGrid');
      
      if(filtered.length === 0) {
        grid.innerHTML = '<div class="col-span-full text-center text-gray-400 py-10">Produk tidak ditemukan</div>';
        return;
      }

      grid.innerHTML = filtered.map(p => `
        <div class="border rounded-xl p-4 hover:shadow-md hover:border-indigo-300 transition cursor-pointer flex flex-col justify-between" onclick="addToCart(${p.id})">
          <div class="bg-indigo-50 text-indigo-600 rounded-lg w-10 h-10 flex items-center justify-center mb-3">
            <i class="fas fa-box"></i>
          </div>
          <h4 class="font-semibold text-sm text-gray-800">${p.name}</h4>
          <p class="text-indigo-600 font-bold mt-1">Rp ${Number(p.price).toLocaleString('id-ID')}</p>
          <p class="text-xs text-gray-400 mt-1">Stok: ${p.stock}</p>
        </div>
      `).join('');
    }

    function renderProductTable() {
      const tbody = document.getElementById('productTable');
      tbody.innerHTML = products.map(p => `
        <tr class="hover:bg-gray-50 transition">
          <td class="py-3 text-sm text-gray-500">${p.id}</td>
          <td class="py-3 font-medium text-sm">${p.name}</td>
          <td class="py-3 text-sm">Rp ${Number(p.price).toLocaleString('id-ID')}</td>
          <td class="py-3 text-sm ${p.stock < 5 ? 'text-red-600 font-semibold' : 'text-gray-600'}">${p.stock}</td>
        </tr>
      `).join('');
    }

    // CART LOGIC
    function addToCart(id) {
      const product = products.find(p => p.id == id);
      if(!product || product.stock <= 0) return alert('Stok habis!');

      const existing = cart.find(c => c.id == id);
      if(existing) {
        if(existing.qty < product.stock) existing.qty++;
        else return alert('Stok tidak mencukupi!');
      } else {
        cart.push({ id: product.id, name: product.name, price: product.price, qty: 1 });
      }
      renderCart();
    }

    function removeFromCart(id) {
      cart = cart.filter(c => c.id != id);
      renderCart();
    }

    function renderCart() {
      const list = document.getElementById('cartList');
      const totalEl = document.getElementById('cartTotal');
      let total = 0;

      if(cart.length === 0) {
        list.innerHTML = '<p class="text-gray-400 text-center text-sm py-10">Keranjang kosong</p>';
        totalEl.textContent = 'Rp 0';
        return;
      }

      list.innerHTML = cart.map(c => {
        const sub = c.price * c.qty;
        total += sub;
        return `
          <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl fade-in">
            <div class="flex-1">
              <p class="font-medium text-sm text-gray-800">${c.name}</p>
              <p class="text-xs text-gray-500">${c.qty} x Rp ${Number(c.price).toLocaleString('id-ID')}</p>
            </div>
            <div class="flex items-center space-x-3">
              <span class="font-semibold text-sm text-indigo-600">Rp ${Number(sub).toLocaleString('id-ID')}</span>
              <button onclick="removeFromCart(${c.id})" class="text-red-400 hover:text-red-600 transition"><i class="fas fa-trash-alt text-xs"></i></button>
            </div>
          </div>
        `;
      }).join('');

      totalEl.textContent = `Rp ${Number(total).toLocaleString('id-ID')}`;
    }

    // CHECKOUT LOGIC
    async function handleCheckout() {
      if(cart.length === 0) return alert('Keranjang masih kosong!');
      if(!confirm('Proses pembayaran?')) return;

      const btn = document.getElementById('btnCheckout');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
      btn.disabled = true;

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'checkout', cart: cart, cashier: currentUser.username })
        });
        const data = await res.json();
        
        if(data.success) {
          alert('Transaksi berhasil!');
          cart = [];
          renderCart();
          loadProducts(); // Refresh stok
        } else {
          alert('Gagal: ' + data.message);
        }
      } catch (e) {
        alert('Gagal terhubung ke server');
      } finally {
        btn.innerHTML = 'Bayar Sekarang';
        btn.disabled = false;
      }
    }

    // UI TABS & NAVIGATION
    function switchTab(tab) {
      ['pos', 'products', 'history'].forEach(t => {
        document.getElementById(`tab-${t}`).classList.add('hidden');
        document.getElementById(`nav-${t}`).classList.remove('active');
      });
      document.getElementById(`tab-${tab}`).classList.remove('hidden');
      document.getElementById(`nav-${tab}`).classList.add('active');
    }

    function toggleMobileMenu() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('hidden');
      sidebar.classList.toggle('fixed');
      sidebar.classList.toggle('inset-0');
      sidebar.classList.toggle('z-50');
      sidebar.classList.toggle('flex');
    }
  </script>
</body>
</html>
